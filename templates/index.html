<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket List Cinema | 影迷願望清單</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bucket List <span>Cinema</span></h1>
            <p style="color: var(--text-muted); margin-top: 8px; letter-spacing: 1px;">粉絲互動社群策展 × 自定義觀影日誌 Web App</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('vote', event)">主題策展投票</button>
            <button class="tab-btn" onclick="switchTab('journal', event)">我的觀影日誌</button>
        </div>

        <div id="vote-section" class="section active">
            <div class="theme-banner">
                <h2 id="theme-title">正在載入本週主題...</h2>
            </div>
            <div class="movie-grid" id="vote-grid"></div>
        </div>

        <div id="journal-section" class="section">
            <div class="search-box">
                <input type="text" id="search-input" class="search-input" placeholder="輸入電影片名，串接 TMDB 資料庫搜出海報...">
                <button class="btn-primary" onclick="searchMovies()">搜尋電影</button>
            </div>
            <div class="movie-grid" id="search-results"></div>
            <div class="journal-list">
                <h3>已記錄的心得日誌</h3>
                <div id="journal-container"></div>
            </div>
        </div>
    </div>

    <!-- IG 預覽卡片 -->
    <div id="share-modal" class="share-modal">
        <div class="share-card-container">
            <button class="share-close" onclick="closeShareModal()">×</button>
            <div style="text-align: center; width: 100%;">
                <div style="font-size: 0.75rem; letter-spacing: 3px; color: var(--accent-red); font-weight: 800; margin-bottom: 25px; text-transform: uppercase;">Bucket List Cinema</div>
                <img id="share-poster" src="" style="width: 160px; aspect-ratio: 2/3; object-fit: cover; border-radius: 10px; box-shadow: 0 12px 24px rgba(0,0,0,0.6); border: 1px solid #333;">
                <h2 id="share-title" style="font-size: 1.2rem; margin-top: 18px; font-weight:700;"></h2>
                <div id="share-stars" style="color: var(--accent-gold); margin: 10px 0; font-size: 1.1rem;"></div>
            </div>
            <div style="background: rgba(255,255,255,0.04); padding: 20px; border-radius: 12px; width: 100%; min-height: 120px; border: 1px solid #222; display:flex; align-items:center; justify-content:center; text-align:center;">
                <p style="font-style: italic; font-size: 0.95rem; line-height: 1.6; color: #e5e7eb; white-space: pre-wrap;">" <span id="share-review"></span> "</p>
            </div>
            <div style="text-align: center;">
                <div style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px;">加入我的影迷願望清單</div>
                <div style="font-size: 0.65rem; color: #4b5563; font-family: monospace;">bucket-list-cinema.net</div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
